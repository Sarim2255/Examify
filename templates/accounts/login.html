{% extends 'base.html' %}

{% block content %}
<div class="glass-panel" style="max-width: 450px; margin: 5rem auto; position: relative;">
    
    <!-- Abstract orb decoration -->
    <div style="position: absolute; top: -20px; right: -20px; font-size: 2.5rem;">🔐</div>

    <h2 style="font-size: 2rem; font-weight: 800; letter-spacing: -0.5px; text-align: center; margin-bottom: 0.5rem;">Welcome back</h2>
    <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">Please enter your details to sign in.</p>
    
    {% if form.errors %}
      <div class="alert alert-error" style="font-size: 0.9rem; justify-content: center; text-align: center;">
        <i class="fa-solid fa-triangle-exclamation"></i> Incorrect username or password.
      </div>
    {% endif %}

    <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        
        <div class="form-group">
            <label>Username</label>
            {{ form.username }}
        </div>
        
        <div class="form-group">
            <label style="display: flex; justify-content: space-between;">
                Password 
                <a href="{% url 'password_reset' %}" style="font-size: 0.8rem; font-weight: 600; color: var(--primary-color); text-decoration: none;">Forgot password?</a>
            </label>
            {{ form.password }}
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1.5rem; padding: 1rem; font-size: 1.05rem;">Sign In instantly</button>
        <input type="hidden" name="next" value="{{ next }}" />
    </form>

    <div style="margin-top: 2rem; text-align: center; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 1.5rem;">
        <p style="color: var(--text-muted); font-size: 0.95rem;">Don't have an account? <a href="{% url 'register' %}" style="color: var(--primary-color); font-weight: 700; text-decoration: none;">Create one for free</a></p>
    </div>
</div>
{% endblock %}
